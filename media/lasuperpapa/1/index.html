

      <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Video Player</title>

<style>
:root{
  --bg: #1e1e2e;
  --surface: #24273a;
  --surface2: #2e3440;
  --text: #cad3f5;
  --subtext: #a5adcb;

  --red: #ed8796;
  --yellow: #eed49f;
  --green: #a6da95;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background: linear-gradient(
    135deg,
    #1e1e2e,
    #24273a,
    #2e3440
  );

  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

  font-family:
    Inter,
    system-ui,
    sans-serif;

  color:var(--text);
  padding:30px;
}

.window{
  width:min(100%, 1000px);

  background:rgba(36,39,58,.92);

  border:1px solid rgba(255,255,255,.08);

  border-radius:22px;

  overflow:hidden;

  backdrop-filter:blur(20px);

  box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

.titlebar{
  height:52px;

  display:flex;
  align-items:center;

  padding:0 18px;

  background:rgba(255,255,255,.03);

  border-bottom:1px solid rgba(255,255,255,.06);
}

.buttons{
  display:flex;
  gap:8px;
}

.circle{
  width:13px;
  height:13px;
  border-radius:50%;
}

.red{background:var(--red);}
.yellow{background:var(--yellow);}
.green{background:var(--green);}

.content{
  padding:26px;
}

.video-title{
  font-size:2rem;
  font-weight:800;

  margin-bottom:8px;
}

.author{
  color:var(--subtext);

  margin-bottom:24px;

  font-size:1rem;
}

.video-wrapper{
  position:relative;
  width:100%;
  padding-top:56.25%;

  border-radius:18px;
  overflow:hidden;

  background:#000;
}

.video-wrapper iframe{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  border:none;
}
</style>
</head>
<body>

<div class="window">

  <div class="titlebar">
    <div class="buttons">
      <div class="circle red"></div>
      <div class="circle yellow"></div>
      <div class="circle green"></div>
    </div>
  </div>

  <div class="content">

    <h1 class="video-title">
      NOMIK VS DELTAPAPUS (PT1)
    </h1>

    <div class="author">
     por "LaSuperPapa" (YT Account: PedroLaBoligoma)
    </div>

<div class="video-wrapper">
  <iframe
    width="560"
    height="315"
    src="https://www.youtube-nocookie.com/embed/PR_HmG_l6mY"
    title="NOMIK VS DELTAPAPUS"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

  </div>
</div>

</body>
</html>
