<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Video Player</title>

<style>

:root{
  --bg:#1e1e2e;
  --surface:#24273a;
  --surface2:#2e3440;

  --text:#cad3f5;
  --subtext:#a5adcb;

  --red:#ed8796;
  --yellow:#eed49f;
  --green:#a6da95;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    linear-gradient(
      135deg,
      #1e1e2e,
      #24273a,
      #2e3440
    );

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:
    Inter,
    system-ui,
    sans-serif;

  color:var(--text);

  padding:30px;
}

.window{
  width:min(100%,1000px);

  background:rgba(36,39,58,.92);

  border:
    1px solid rgba(255,255,255,.08);

  border-radius:22px;

  overflow:hidden;

  backdrop-filter:blur(20px);

  box-shadow:
    0 20px 60px rgba(0,0,0,.45);
}

.titlebar{
  height:52px;

  display:flex;
  align-items:center;

  padding:0 18px;

  background:rgba(255,255,255,.03);

  border-bottom:
    1px solid rgba(255,255,255,.06);
}

.buttons{
  display:flex;
  gap:8px;
}

.circle{
  width:13px;
  height:13px;

  border-radius:50%;
}

.red{background:var(--red);}
.yellow{background:var(--yellow);}
.green{background:var(--green);}

.content{
  padding:26px;
}

.video-title{
  font-size:2rem;
  font-weight:800;

  margin-bottom:8px;
}

.author{
  color:var(--subtext);

  margin-bottom:24px;
}

.video-wrapper{
  position:relative;

  width:100%;
  padding-top:56.25%;

  border-radius:18px;
  overflow:hidden;

  background:#000;
}

.video-wrapper iframe{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  border:none;
}

</style>
</head>
<body>

<div class="window">

  <div class="titlebar">
    <div class="buttons">
      <div class="circle red"></div>
      <div class="circle yellow"></div>
      <div class="circle green"></div>
    </div>
  </div>

  <div class="content">

    <h1
      class="video-title"
      id="videoTitle">
      Cargando...
    </h1>

    <div
      class="author"
      id="videoAuthor">
      cargando autor...
    </div>

    <div class="video-wrapper">

      <iframe
        id="player"
        allowfullscreen>
      </iframe>

    </div>

  </div>
</div>

<script>

const params =
  new URLSearchParams(
    window.location.search
  );

const videoId =
  params.get("v");

if(videoId){

  document.getElementById("player").src =
    `https://www.youtube-nocookie.com/embed/${videoId}`;

  fetch("/media/videos.json")
  .then(r => r.json())
  .then(videos => {

    const video =
      videos.find(
        v => v.youtube === videoId
      );

    if(video){

      document.title =
        video.title;

      document.getElementById(
        "videoTitle"
      ).textContent =
        video.title;

      document.getElementById(
        "videoAuthor"
      ).textContent =
        "por " + video.author;

    }

  });

}

</script>

</body>
</html>
